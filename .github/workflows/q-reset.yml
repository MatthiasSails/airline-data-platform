name: Reset Q environment

# Fires on merge AND on close-without-merge (both raise "closed"; the boolean
# github.event.pull_request.merged only distinguishes them, we don't need to).
# Known v1 limitation: this resets the Q stack's IMAGE_TAG, not its compose
# file — a PR that itself edits deployment/gold-dash.yml only takes effect in
# Q after merge, since the stack's GitConfig tracks main.
on:
  pull_request:
    types: [closed]
    paths:
      - "03-gold-dash/api/**"
      - "03-gold-dash/dashboard/**"

jobs:
  reset-q:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Reset Q stack to :latest
        env:
          PORTAINER_URL: ${{ secrets.PORTAINER_URL }}
          PORTAINER_API_KEY: ${{ secrets.PORTAINER_API_KEY }}
          PORTAINER_Q_ENDPOINT_ID: ${{ secrets.PORTAINER_Q_ENDPOINT_ID }}
          PORTAINER_Q_STACK_ID: ${{ secrets.PORTAINER_Q_STACK_ID }}
        run: ./deployment/scripts/set-q-image-tag.sh latest
