services:
  api:
    build: .
    image: airline-delay-api:latest
    ports:
      - "8000:8000"
    environment:
      - WEB_CONCURRENCY=2
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3)"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
