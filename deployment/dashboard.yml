# airline-dashboard stack — Streamlit live map over the Silver layer (Supabase).
#
# network_mode: host is REQUIRED, not a style choice. The dashboard connects to
# Supabase's Direct Connection host (db.<project-ref>.supabase.co), which is IPv6-only.
# The Docker default bridge has EnableIPv6=false, so a bridged container cannot reach Supabase.
# Host networking gives the container the VM's global IPv6. Streamlit listens on
# :8501 and the Cloudflare tunnel points there. Do NOT switch to bridge + ports.
#
# Env (SUPABASE_DB_HOST, SUPABASE_DB_PASSWORD) is injected by Portainer per stack,
# not from the repo .env (which is gitignored and absent in the GitOps clone).
services:
  adsb-dashboard:
    build: ../03-gold/dashboard
    container_name: adsb_dashboard
    network_mode: host
    environment:
      - SUPABASE_DB_HOST=${SUPABASE_DB_HOST}
      - SUPABASE_DB_PASSWORD=${SUPABASE_DB_PASSWORD}
    restart: unless-stopped
    logging:
      driver: local
