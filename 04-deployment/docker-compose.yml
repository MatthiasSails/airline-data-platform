services:
  landing-page:
    build:
      context: ./landing-page
    image: airline-landing-page:latest
    container_name: landing_page
    ports:
      - "80:80"
    restart: unless-stopped

  adsb-dashboard:
    build: ../03-data-consumption/dashboard
    container_name: adsb_dashboard
    ports:
      - "8501:8501"
    env_file:
      - ../.env
    restart: unless-stopped

  jupyter:
    build: ./jupyter
    container_name: jupyter
    ports:
      - "8888:8888"
    volumes:
      - ..:/workspace
    env_file:
      - ../.env
    restart: unless-stopped
